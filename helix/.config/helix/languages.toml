[[language]]
name = "python"
language-servers = [ "pyright", "ruff" ]

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"


[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.rust-analyzer.config.check]
command = "clippy"


[language-server.rust-analyzer.config.cargo]
allFeatures = true

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }

[language-server.tinymist]
command = "tinymist"


[[language]]
name = "typst"
language-servers = ["tinymist", "harper-ls"]

[language-server.emmet-lsp]
command = "emmet-language-server"
args = ["--stdio"]


[[language]]
name = "html"
language-servers = [ "vscode-html-language-server", "emmet-lsp" ]


[[language]]
name = "css"
language-servers = [ "vscode-css-language-server", "emmet-lsp" ]


[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]

[language-server.harper-ls.config.harper-ls]
dialect = "British" 
diagnosticSeverity = "hint" # Use "warning" if you want them to be more prominent

[[language]]
name = "markdown"
language-servers = [ "marksman", "harper-ls" ]


[[language]]
name = "cpp"

[language-server.clangd]
command = "clangd"
args = [
  "--compile-commands-dir=.",
  "--header-insertion=never",
  # This tells clangd where it's allowed to look for the compiler
  "--query-driver=/**/bin/arm-none-eabi*",
  "--background-index"
]
