log_level = "debug"
outputs = "All"
position = "Top"

[modules]
left = [ "Workspaces", "MediaPlayer"]
center = [ "WindowTitle", "Updates" ]
right = ["Tray", "SystemInfo", "Tempo", "Settings" ]

[settings]
indicators = ["Battery", "Bluetooth", "Network", "Audio", "PowerProfile"]


[system_info]
indicators = ["Memory", "Cpu" ]
interval = 10

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85


[system_info.disk]
warn_threshold = 80
alert_threshold = 90

[updates]
check_cmd = "checkupdates; paru -Qua"
update_cmd = 'ghostty -e bash -c "paru; echo Done - Press enter to exit; read" &'
interval = 3600

[media_player]
max_title_length = 50
indicator_format = "Icon"

[appearance]

primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#a9b1d6"

workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"


